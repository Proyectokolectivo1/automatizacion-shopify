name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate isolated CI environment
        run: pnpm infra:bootstrap

      - name: Validate repository
        run: pnpm validate

      - name: Start local dependencies
        run: pnpm infra:up

      - name: Verify database migration and constraints
        run: pnpm database:verify

      - name: Verify transactional outbox and queues
        run: pnpm outbox:verify

      - name: Verify tenant-safe DLQ operations
        run: pnpm dlq:verify

      - name: Verify authentication, sessions and RBAC
        run: pnpm auth:verify

      - name: Verify owner bootstrap and identity administration
        run: pnpm identity:verify

      - name: Verify simulated Shopify integration registry
        run: pnpm shopify:verify

      - name: Run API integration tests
        run: pnpm test:integration

      - name: Verify observability failure recovery
        run: pnpm observability:verify

      - name: Show dependency logs on failure
        if: failure()
        run: docker compose logs --tail=200 postgres redis minio

      - name: Stop local dependencies
        if: always()
        run: pnpm infra:down
