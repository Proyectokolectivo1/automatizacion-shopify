global:
  resolve_timeout: 30s

route:
  receiver: local-webhook
  group_by: [alertname, dependency, service]
  group_wait: 100ms
  group_interval: 500ms
  repeat_interval: 1h

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-receiver:8080/alerts
        send_resolved: true
        max_alerts: 10
        timeout: 2s
